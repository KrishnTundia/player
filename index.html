<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      text-decoration: none;
      scroll-behavior: smooth;
    }

    body {
      background: #ffffff;
      min-height: 100vh;
      color: #fff;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    .myusicbg {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* PLAYER CARD: Dynamically Morphs Aspect Ratio to fit the video perfectly */
    .player-card {
      border-radius: 20px 0px 0px 20px;
      height: 100%;
      width: auto;
      aspect-ratio: 16 / 9; /* Defaults to widescreen, changes via JS */
      flex-shrink: 0;
      background: #000;
      position: relative;
      overflow: hidden; 
      transition: aspect-ratio 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .player-nard {
      overflow: hidden;
      border-radius: 0px 20px 20px 0px;
      flex: 1; 
      height: 100%;
      background: rgba(5, 40, 46, 0.2) url(fabric-1-light.png);
      backdrop-filter: blur(8px) brightness(1) saturate(1.5);
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
    }

    .player-lard {
      border-radius: 20px;
      display: flex;
      flex-direction: row;
      width: 550px; /* Slightly wider to give morphing room */
      height: 160px;
      background: transparent;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      position: relative;
      overflow: hidden; 
    }

    .player-bard {
      position: absolute;
      top: 123%;
      left: 51%;
      transform: translate(-50%, -50%);
      width: 100%;
      height: 100%;
    }

    .video-wrapper {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      overflow: hidden;
    }

    /* Video naturally fills 100% of the morphing container */
    #player {
      position: absolute;
      top: 0; 
      left: 0;
      width: 100%; 
      height: 100%;
      pointer-events: none;
      border: none;
    }

    .click-catcher {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 5;
      cursor: pointer;
    }

    /* ONLY APPEARS WHEN PAUSED */
    .video-blur-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(5, 40, 46, 0.4) url(fabric-1-light.png);
      backdrop-filter: blur(12px) brightness(0.9) saturate(1.5);
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
      z-index: 6;
    }
    .video-blur-overlay.paused {
      opacity: 1;
    }

    /* Playlist Open Button */
    .playlist-toggle-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: transparent url(fabric-1-light.png);
      background-color: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(8px) brightness(1.5);
      border: 1px solid rgba(255, 255, 255, 0.3);
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      z-index: 15;
      transition: all 0.2s ease;
      opacity: 0; 
      pointer-events: none;
    }
    .playlist-toggle-btn:hover {
      background-color: rgba(255, 255, 255, 0.35);
      transform: scale(1.1);
    }

    /* BUTTON CONTROLS LAYER - Hoverable without Blur */
    .overlay-controls {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px; 
      opacity: 0;
      transition: all 0.2s ease;
      z-index: 10;
      pointer-events: none; 
    }

    /* Triggers visibility on Hover (PC), Awake (Mobile), or Paused */
    .overlay-controls.show,
    .video-wrapper:hover .overlay-controls,
    .video-wrapper:hover .playlist-toggle-btn,
    .video-wrapper.controls-awake .overlay-controls,
    .video-wrapper.controls-awake .playlist-toggle-btn {
      opacity: 1;
      pointer-events: auto; 
    }

    .ctrl-btn {
      border-radius: 50%;
      background: transparent url(fabric-1-light.png);
      background-color: rgba(255, 255, 255, 0.15); 
      backdrop-filter: blur(8px) brightness(1) saturate(1.5);
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
      transition: all 0.2s ease;
      flex-shrink: 0;
      cursor: pointer;
      border: 1px solid rgba(255, 255, 255, 0.3); 
    }

    .ctrl-btn.small { width: 32px; height: 32px; }
    .ctrl-btn.small i { font-size: 14px; }

    .ctrl-btn.large { width: 48px; height: 48px; }
    .ctrl-btn.large i { font-size: 18px; transform: translateX(1px); }
    .ctrl-btn.large.paused i { transform: translateX(0px); }

    .ctrl-btn:hover {
      background-color: rgba(255, 255, 255, 0.35);
      transform: scale(1.1);
    }

    .controls-bar {
      display: flex;
      align-items: center;
      padding: 12px 20px 0px 20px;
      background: transparent;
      width: 100%;
    }

    .info-container {
      width: 100%;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0; 
    }

    .track-title-wrapper, .track-author-wrapper {
      width: 100%;
      overflow: hidden;
      white-space: nowrap; 
      position: relative;
      mask-image: linear-gradient(to right, transparent, black 2%, black 98%, transparent);
      -webkit-mask-image: linear-gradient(to right, transparent, black 2%, black 98%, transparent);
    }

    #titleLink, #authorLink {
      color: inherit;
      text-decoration: none;
      cursor: pointer;
      display: inline-block;
      font-family: inherit;
      transition: color 0.2s ease;
    }

    #titleLink:hover, #authorLink:hover { text-decoration: underline; text-underline-offset: 2px; }
    #title { font-weight: bold; font-size: 15px; }
    #author { font-size: 13px; color: rgba(255, 255, 255, 0.85); }

    @keyframes scrollVar {
      0%, 15% { transform: translateX(0); }
      85%, 100% { transform: translateX(var(--scroll-dist)); }
    }

    .controls-car {
      display: flex;
      align-items: center;
      background: transparent;
      gap: 8px;
      flex-direction: column;
      height: auto;
      width: 100%;
      padding-top: 5px;
    }

    .controls-car1, .controls-car2 {
      display: flex;
      align-items: center;
      background: transparent;
      flex-direction: row;
      width: 100%;
    }
    .controls-car1 { padding: 5px 20px; gap: 15px; }
    .controls-car2 { padding: 0px 20px 12px 20px; gap: 10px; }

    .bttn {
      border-radius: 50%;
      background: transparent url(fabric-1-light.png);
      background-color: rgba(255, 255, 255, 0.15); 
      backdrop-filter: blur(8px) brightness(1) saturate(1.5);
      border: 1px solid rgba(255, 255, 255, 0.3); 
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s ease;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      outline: none;
    }
    .bttn:hover { background-color: rgba(255, 255, 255, 0.35); transform: scale(1.1); }

    .time { font-size: 12px; font-weight: 500; min-width: 35px; text-align: center; }

    /* CUSTOM SLIDERS */
    .custom-slider {
      position: relative;
      width: 100%;
      height: 24px; 
      display: flex;
      align-items: center;
      cursor: pointer;
      touch-action: none; 
    }

    .custom-slider-track {
      position: absolute;
      width: 100%;
      height: 6px;
      background: rgba(255, 255, 255, 0.35); 
      border-radius: 3px;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.2);
    }

    .custom-slider-fill {
      position: absolute;
      height: 6px;
      background: #fff;
      border-radius: 3px;
      width: 0%;
      transition: width 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    .custom-slider-thumb {
      position: absolute;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: transparent url(fabric-1-light.png);
      background-color: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(8px) brightness(1.5);
      border: 1px solid rgba(255, 255, 255, 0.9);
      left: 0%;
      transform: translateX(-50%);
      transition: left 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }

    .custom-slider.dragging .custom-slider-fill,
    .custom-slider.dragging .custom-slider-thumb {
      transition: none; 
    }

    /* PLAYLIST PANEL */
    .playlist-panel {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(5, 40, 46, 0.95);
      backdrop-filter: blur(20px);
      z-index: 50;
      display: flex;
      flex-direction: column;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.3s ease, visibility 0.3s ease;
    }
    .playlist-panel.show { 
      opacity: 1; 
      visibility: visible;
      pointer-events: auto;
    }
    
    .playlist-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 20px; border-bottom: 1px solid rgba(255,255,255,0.15);
    }
    .playlist-header h3 { font-size: 15px; font-weight: 600; margin: 0; }
    .playlist-header i { font-size: 18px; cursor: pointer; transition: transform 0.2s; }
    .playlist-header i:hover { transform: scale(1.2); }

    .playlist-items { flex: 1; overflow-y: auto; padding: 10px; }
    .playlist-items::-webkit-scrollbar { width: 6px; }
    .playlist-items::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 3px; }

    .playlist-item {
      display: flex; gap: 12px; padding: 8px 10px; border-radius: 10px;
      cursor: pointer; transition: background 0.2s; align-items: center;
    }
    .playlist-item:hover { background: rgba(255,255,255,0.15); }
    .playlist-item.active { background: rgba(255,255,255,0.25); border-left: 3px solid #fff; }

    .pl-thumb {
      position: relative; width: 64px; height: 36px; border-radius: 6px; overflow: hidden;
      flex-shrink: 0; background: #000; box-shadow: 0 2px 5px rgba(0,0,0,0.3);
    }
    .pl-thumb img { width: 100%; height: 100%; object-fit: cover; }
    
    .pl-duration {
      position: absolute; bottom: 2px; right: 2px;
      background: rgba(0,0,0,0.8); font-size: 9px; padding: 2px 4px; border-radius: 4px;
      display: flex; align-items: center; gap: 3px;
    }
    
    .pl-info { display: flex; flex-direction: column; justify-content: center; overflow: hidden; }
    .pl-title { font-size: 13px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff;}
    .pl-author { font-size: 11px; color: rgba(255,255,255,0.75); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px;}

  </style>
</head>
<body>

  <div class="myusicbg">
    <div class="player-bard">
      <div class="player-lard">
        
        <div class="player-card" id="playerCard">
          <div class="video-wrapper" id="videoWrapper">
            <div class="player" id="player"></div>
            <div class="video-blur-overlay" id="blurOverlay"></div>
            <div class="click-catcher" id="clickCatcher"></div>

            <div class="overlay-controls" id="overlayControls">
              <div class="ctrl-btn small" id="prevBtn"><i class="fas fa-backward-step"></i></div>
              <div class="ctrl-btn large" id="overlayPlay"><i class="fas fa-play" id="playIcon"></i></div>
              <div class="ctrl-btn small" id="nextBtn"><i class="fas fa-forward-step"></i></div>
            </div>
            
            <div class="playlist-toggle-btn" id="openPlaylistBtn"><i class="fas fa-list"></i></div>
          </div>
        </div>

        <div class="player-nard">
          <div class="controls-bar">
            <div class="info-container">
              <div class="track-title-wrapper">
                <a href="#" target="_blank" id="titleLink"><span id="title"></span></a>
              </div>
              <div class="track-author-wrapper">
                <a href="#" target="_blank" id="authorLink"><span id="author"></span></a>
              </div>
            </div>
          </div>

          <div class="controls-car">
            <div class="controls-car1">
              <button id="muteBtn" class="bttn"><i class="fas fa-volume-high"></i></button>
              <div class="custom-slider" id="volumeSlider">
                <div class="custom-slider-track"></div>
                <div class="custom-slider-fill"></div>
                <div class="custom-slider-thumb"></div>
              </div>
            </div>

            <div class="controls-car2">
              <span class="time" id="currentTime">0:00</span>
              <div class="custom-slider" id="progressSlider">
                <div class="custom-slider-track"></div>
                <div class="custom-slider-fill"></div>
                <div class="custom-slider-thumb"></div>
              </div>
              <span class="time" id="duration">0:00</span>
            </div>
          </div>
        </div>

        <div class="playlist-panel" id="playlistPanel">
          <div class="playlist-header">
            <h3>Next Up</h3>
            <i class="fas fa-times" id="closePlaylistBtn"></i>
          </div>
          <div class="playlist-items" id="playlistItems">
            </div>
        </div>

      </div>
    </div>
  </div>

  <script>
    window.addEventListener("DOMContentLoaded", () => {
      let player;
      let duration = 0;
      let lastVolume = 100;
      let progressInterval;
      let currentTitle = "";
      let currentVideoId = "";
      let isSeeking = false;
      let playlistCache = {};
      let controlsTimeout;

      // MOBILE TOUCH & PC MOUSE SLIDERS
      function setupCustomSlider(sliderId, onChangeCallback) {
        const slider = document.getElementById(sliderId);
        const fill = slider.querySelector('.custom-slider-fill');
        const thumb = slider.querySelector('.custom-slider-thumb');
        let isDragging = false;

        function getX(e) {
          return e.type.includes('touch') ? (e.touches[0] || e.changedTouches[0]).clientX : e.clientX;
        }

        function updateToClientX(clientX) {
          const rect = slider.getBoundingClientRect();
          let x = clientX - rect.left;
          let percent = x / rect.width;
          percent = Math.max(0, Math.min(1, percent));
          fill.style.width = (percent * 100) + '%';
          thumb.style.left = (percent * 100) + '%';
          return percent;
        }

        function startDrag(e) {
          isDragging = true;
          const percent = updateToClientX(getX(e));
          onChangeCallback(percent, false);
        }

        function drag(e) {
          if (!isDragging) return;
          slider.classList.add('dragging'); 
          const percent = updateToClientX(getX(e));
          onChangeCallback(percent, false);
        }

        function endDrag(e) {
          if (!isDragging) return;
          isDragging = false;
          slider.classList.remove('dragging');
          const percent = updateToClientX(getX(e));
          onChangeCallback(percent, true); 
        }

        slider.addEventListener('mousedown', startDrag);
        window.addEventListener('mousemove', drag);
        window.addEventListener('mouseup', endDrag);

        slider.addEventListener('touchstart', startDrag, { passive: true });
        window.addEventListener('touchmove', drag, { passive: false });
        window.addEventListener('touchend', endDrag);

        window.addEventListener('mouseleave', () => {
          if (isDragging) {
            isDragging = false;
            slider.classList.remove('dragging');
          }
        });

        return {
          setValue: (percent) => {
            if (!isDragging) {
              fill.style.width = (percent * 100) + '%';
              thumb.style.left = (percent * 100) + '%';
            }
          },
          getIsDragging: () => isDragging
        };
      }

      const progCtrl = setupCustomSlider('progressSlider', (percent, isFinal) => {
        if (!player || !player.getDuration) return;
        const dur = player.getDuration();
        document.getElementById("currentTime").textContent = formatTime(percent * dur);
        isSeeking = !isFinal;
        if (isFinal) player.seekTo(percent * dur, true);
      });

      const volCtrl = setupCustomSlider('volumeSlider', (percent, isFinal) => {
        let v = Math.round(percent * 100);
        player.setVolume(v);
        if (v === 0) {
          player.mute();
          document.getElementById("muteBtn").innerHTML = '<i class="fas fa-volume-xmark"></i>';
        } else {
          player.unMute();
          document.getElementById("muteBtn").innerHTML = '<i class="fas fa-volume-high"></i>';
          lastVolume = v; 
        }
      });

      // YOUTUBE API
      window.onYouTubeIframeAPIReady = function () {
        player = new YT.Player("player", {
          height: "100%",
          width: "100%",
          playerVars: {
            listType: "playlist",
            list: 'PLuYtMktKY-7ZPqbNa40mFve9l9lzh7wvo', 
            controls: 0,
            modestbranding: 0,
            rel: 0,
            showinfo: 0,
            autoplay: 1,
            mute: 1,
            playsinline: 1 
          },
          events: {
            onReady: onPlayerReady,
            onStateChange: onPlayerStateChange,
          },
        });
      };

      // FETCHES TRUE NATIVE ASPECT RATIO
      function updateAspectRatio(videoId) {
        if (!videoId) return;
        fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${videoId}&format=json`)
          .then(res => res.json())
          .then(data => {
            const card = document.getElementById('playerCard');
            if (data && data.width && data.height) {
              card.style.aspectRatio = `${data.width} / ${data.height}`;
            } else {
              card.style.aspectRatio = "16 / 9"; 
            }
          })
          .catch(() => {
            document.getElementById('playerCard').style.aspectRatio = "16 / 9";
          });
      }

      function enforceQuality() {
        if (!player || typeof player.getAvailableQualityLevels !== 'function') return;
        const qualities = player.getAvailableQualityLevels();
        if (qualities.includes('large')) player.setPlaybackQuality('large'); 
        else if (qualities.includes('medium')) player.setPlaybackQuality('medium'); 
        else player.setPlaybackQuality('medium'); 
      }

      function updateMarquee(id) {
        const el = document.getElementById(id);
        const wrapper = el.parentElement.parentElement; 
        el.style.animation = 'none';
        void el.offsetWidth; 
        if (el.scrollWidth > wrapper.clientWidth) {
          const distance = el.scrollWidth - wrapper.clientWidth + 15; 
          const animDuration = (distance / 20) + 2; 
          el.style.setProperty('--scroll-dist', `-${distance}px`);
          el.style.animation = `scrollVar ${animDuration}s linear infinite alternate`;
        }
      }

      function updateInfo() {
        const data = player.getVideoData();
        if (!data) return;
        
        if (data.title) {
          document.getElementById("title").textContent = data.title;
          document.getElementById('titleLink').href = `https://www.youtube.com/watch?v=${data.video_id}`;
          updateMarquee("title");
        }
        if (data.author) {
          document.getElementById("author").textContent = data.author;
          document.getElementById('authorLink').href = `https://www.youtube.com/results?search_query=${encodeURIComponent(data.author)}`;
          updateMarquee("author");
        }

        // Dynamically trigger ratio update
        if (data.video_id && data.video_id !== currentVideoId) {
          currentVideoId = data.video_id;
          updateAspectRatio(currentVideoId);
        }

        highlightActivePlaylistItem();
      }

      window.addEventListener('resize', () => {
        if (currentTitle) {
          updateMarquee("title");
          updateMarquee("author");
        }
      });

      // STRICT PLAYLIST LOCKER - Fixes Random Video Glitch
      function playStrictNext() {
        const list = player.getPlaylist();
        let idx = player.getPlaylistIndex();
        if (list && idx !== -1) {
          player.playVideoAt((idx + 1) % list.length);
        }
      }

      function playStrictPrev() {
        const list = player.getPlaylist();
        let idx = player.getPlaylistIndex();
        if (list && idx !== -1) {
          player.playVideoAt((idx - 1 + list.length) % list.length);
        }
      }

      // WAKE MOBILE CONTROLS
      function wakeMobileControls() {
        const wrapper = document.getElementById('videoWrapper');
        wrapper.classList.add('controls-awake');
        clearTimeout(controlsTimeout);
        controlsTimeout = setTimeout(() => {
          if (player && player.getPlayerState() === YT.PlayerState.PLAYING) {
            wrapper.classList.remove('controls-awake');
          }
        }, 3000); // Fades out after 3 seconds of no tapping
      }

      function onPlayerStateChange(event) {
        const overlayControls = document.getElementById("overlayControls");
        const blurOverlay = document.getElementById("blurOverlay");
        const playBtnContainer = document.getElementById("overlayPlay");
        const playIcon = document.getElementById("playIcon");

        switch (event.data) {
          case YT.PlayerState.ENDED:
            updateInfo();
            clearInterval(progressInterval);
            break;
          case YT.PlayerState.PLAYING:
            enforceQuality(); 
            updateInfo();
            progressInterval = setInterval(updateProgress, 1000);
            
            // Remove Paused visual states
            overlayControls.classList.remove("show");
            blurOverlay.classList.remove("paused");
            
            if (playIcon) playIcon.className = "fas fa-pause";
            playBtnContainer.classList.add("paused");
            duration = player.getDuration();
            document.getElementById("duration").textContent = formatTime(duration);
            break;
          case YT.PlayerState.BUFFERING:
            enforceQuality(); 
            break;
          case YT.PlayerState.UNSTARTED:
          case YT.PlayerState.CUED:
          case YT.PlayerState.PAUSED:
            updateInfo();
            clearInterval(progressInterval);
            
            // Activate Paused Visual States (Blur + Controls lock on)
            overlayControls.classList.add("show");
            blurOverlay.classList.add("paused");
            
            if (playIcon) playIcon.className = "fas fa-play";
            playBtnContainer.classList.remove("paused");
            break;
        }
      }

      function onPlayerReady() {
        enforceQuality(); 
        player.playVideo();
        
        volCtrl.setValue(0);
        document.getElementById("muteBtn").innerHTML = '<i class="fas fa-volume-xmark"></i>';
        setTimeout(updateInfo, 1000);

        // Click Controller (PC vs Mobile handled smartly)
        document.getElementById("clickCatcher").addEventListener("click", () => {
          const isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
          const wrapper = document.getElementById('videoWrapper');
          
          if (isTouch) {
            // Mobile: Tap to wake, tap again to pause
            if (!wrapper.classList.contains('controls-awake')) {
              wakeMobileControls();
            } else {
              togglePlayPause();
              wakeMobileControls();
            }
          } else {
            // PC: Immediate toggle
            togglePlayPause();
          }
        });

        // Any sliding or button clicking keeps mobile UI awake
        document.getElementById("videoWrapper").addEventListener("touchstart", wakeMobileControls, {passive: true});

        document.getElementById("overlayControls").addEventListener("click", (e) => {
          if (e.target.closest("#nextBtn") || e.target.closest("#prevBtn") || e.target.closest("#openPlaylistBtn")) return; 
          togglePlayPause();
        });
        
        document.getElementById("muteBtn").addEventListener("click", toggleMute);
        
        document.getElementById("nextBtn").addEventListener("click", (e) => {
          e.stopPropagation(); playStrictNext();
        });
        
        document.getElementById("prevBtn").addEventListener("click", (e) => {
          e.stopPropagation(); playStrictPrev();
        });

        document.getElementById("openPlaylistBtn").addEventListener("click", (e) => {
          e.stopPropagation();
          document.getElementById("playlistPanel").classList.add("show");
          populatePlaylistUI();
        });
        
        document.getElementById("closePlaylistBtn").addEventListener("click", () => {
          document.getElementById("playlistPanel").classList.remove("show");
        });

        document.addEventListener("keydown", (e) => {
          if (e.key === " ") { e.preventDefault(); togglePlayPause(); }
          if (e.key === "ArrowRight") player.seekTo(player.getCurrentTime() + 5, true);
          if (e.key === "ArrowLeft") player.seekTo(player.getCurrentTime() - 5, true);
          if (e.key === "n") playStrictNext();
          if (e.key === "p") playStrictPrev();
          if (e.key === "m") toggleMute();
        });
      }

      function populatePlaylistUI() {
        const list = player.getPlaylist();
        if (!list) return;
        
        const container = document.getElementById("playlistItems");
        container.innerHTML = "";
        
        list.forEach((id, index) => {
          let item = document.createElement('div');
          item.className = 'playlist-item';
          item.id = `pl-item-${index}`;
          
          item.innerHTML = `
            <div class="pl-thumb">
              <img src="https://i.ytimg.com/vi/${id}/mqdefault.jpg">
              <span class="pl-duration"><i class="fas fa-music"></i></span>
            </div>
            <div class="pl-info">
              <div class="pl-title" id="pl-title-${id}">Loading...</div>
              <div class="pl-author" id="pl-author-${id}"></div>
            </div>
          `;
          
          item.onclick = () => {
            player.playVideoAt(index);
            document.getElementById('playlistPanel').classList.remove('show');
          };
          
          container.appendChild(item);

          if (playlistCache[id]) {
            document.getElementById(`pl-title-${id}`).textContent = playlistCache[id].title;
            document.getElementById(`pl-author-${id}`).textContent = playlistCache[id].author;
          } else {
            fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${id}&format=json`)
              .then(res => res.json())
              .then(data => {
                playlistCache[id] = { title: data.title, author: data.author_name };
                document.getElementById(`pl-title-${id}`).textContent = data.title;
                document.getElementById(`pl-author-${id}`).textContent = data.author_name;
              }).catch(() => {
                document.getElementById(`pl-title-${id}`).textContent = "Track " + (index+1);
              });
          }
        });
        highlightActivePlaylistItem();
      }

      function highlightActivePlaylistItem() {
        if(!player || !player.getPlaylistIndex) return;
        const activeIdx = player.getPlaylistIndex();
        document.querySelectorAll('.playlist-item').forEach(el => el.classList.remove('active'));
        const activeEl = document.getElementById(`pl-item-${activeIdx}`);
        if(activeEl) {
          activeEl.classList.add('active');
          activeEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
      }

      function togglePlayPause() {
        const state = player.getPlayerState();
        if (state === YT.PlayerState.PLAYING) player.pauseVideo();
        else player.playVideo();
      }

      function toggleMute() {
        const btn = document.getElementById("muteBtn");
        if (player.isMuted()) {
          player.unMute();
          btn.innerHTML = '<i class="fas fa-volume-high"></i>';
          volCtrl.setValue(lastVolume / 100);
          player.setVolume(lastVolume);
        } else {
          lastVolume = player.getVolume(); 
          player.mute();
          btn.innerHTML = '<i class="fas fa-volume-xmark"></i>';
          volCtrl.setValue(0);
        }
      }

      function updateProgress() {
        if (!player || !player.getCurrentTime || isSeeking) return;

        const current = player.getCurrentTime();
        const dur = player.getDuration();

        const data = player.getVideoData();
        if (data && data.title && data.title !== currentTitle) {
          currentTitle = data.title;
          updateInfo();
          duration = dur;
          document.getElementById("duration").textContent = formatTime(duration);
        }

        if (dur > 0 && !progCtrl.getIsDragging()) {
          document.getElementById("currentTime").textContent = formatTime(current);
          progCtrl.setValue(current / dur);
        }
      }

      function formatTime(seconds) {
        if (!seconds || isNaN(seconds)) return "0:00";
        const m = Math.floor(seconds / 60);
        const s = Math.floor(seconds % 60).toString().padStart(2, "0");
        return `${m}:${s}`;
      }

      const tag = document.createElement("script");
      tag.src = "https://www.youtube.com/iframe_api";
      document.head.appendChild(tag);
    });
  </script>
</body>
</html>
